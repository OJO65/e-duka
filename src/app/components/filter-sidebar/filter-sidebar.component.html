<!-- Desktop Sidebar -->
<aside *ngIf="!isMobile" class="sidebar">
  <div class="sidebar-header font-iosevka">
    <h3 class="font-bold text-lg">Filters</h3>
    <button 
      *ngIf="hasActiveFilters"
      (click)="onClearFilters()" 
      class="clear-filters-btn"
    >
      Clear All
    </button>
  </div>

  <!-- Availability Filter -->
  <div class="filter-section font-iosevka">
    <h4 class="filter-title">Availability</h4>
    <label class="filter-checkbox">
      <input 
        type="checkbox" 
        [(ngModel)]="activeFilters.showAvailableOnly"
        (change)="onAvailabilityChange()"
      />
      <span>In Stock Only</span>
    </label>
  </div>

  <!-- Price Filter -->
  <div class="filter-section font-iosevka" *ngIf="filterOptions.priceRanges.length > 0">
    <h4 class="filter-title">Price Range</h4>
    <div class="filter-options">
      <label 
        *ngFor="let range of filterOptions.priceRanges" 
        class="filter-checkbox"
      >
        <input 
          type="checkbox" 
          [checked]="isPriceRangeSelected(range.value)"
          (change)="onPriceRangeChange(range.value, $any($event.target).checked)"
        />
        <span>{{ range.label }}</span>
      </label>
    </div>
  </div>

  <!-- Brand Filter -->
  <div class="filter-section font-iosevka" *ngIf="filterOptions.brands.length > 0">
    <h4 class="filter-title">Brand</h4>
    <div class="filter-options">
      <label 
        *ngFor="let brand of filterOptions.brands" 
        class="filter-checkbox"
      >
        <input 
          type="checkbox" 
          [checked]="isBrandSelected(brand)"
          (change)="onBrandChange(brand, $any($event.target).checked)"
        />
        <span>{{ brand }}</span>
      </label>
    </div>
  </div>

  <!-- Tags Filter -->
  <div class="filter-section font-iosevka" *ngIf="filterOptions.tags.length > 0">
    <h4 class="filter-title">Categories</h4>
    <div class="filter-options">
      <label 
        *ngFor="let tag of filterOptions.tags" 
        class="filter-checkbox"
      >
        <input 
          type="checkbox" 
          [checked]="isTagSelected(tag)"
          (change)="onTagChange(tag, $any($event.target).checked)"
        />
        <span>{{ tag }}</span>
      </label>
    </div>
  </div>
</aside>

<!-- Mobile Filter Panel -->
<div *ngIf="isMobile" class="mobile-filter-panel font-iosevka">
  <div class="mobile-filter-header">
    <h3 class="font-bold text-lg">Filters</h3>
    <button (click)="onClose()" class="close-btn">✕</button>
  </div>

  <div class="mobile-filter-content font-iosevka">
    <!-- Availability Filter -->
    <div class="filter-section font-iosevka">
      <h4 class="filter-title">Availability</h4>
      <label class="filter-checkbox">
        <input 
          type="checkbox" 
          [(ngModel)]="activeFilters.showAvailableOnly"
          (change)="onAvailabilityChange()"
        />
        <span>In Stock Only</span>
      </label>
    </div>

    <!-- Price Filter -->
    <div class="filter-section font-iosevka" *ngIf="filterOptions.priceRanges.length > 0">
      <h4 class="filter-title">Price Range</h4>
      <div class="filter-options">
        <label *ngFor="let range of filterOptions.priceRanges" class="filter-checkbox">
          <input 
            type="checkbox" 
            [checked]="isPriceRangeSelected(range.value)"
            (change)="onPriceRangeChange(range.value, $any($event.target).checked)"
          />
          <span>{{ range.label }}</span>
        </label>
      </div>
    </div>

    <!-- Brand Filter -->
    <div class="filter-section font-iosevka" *ngIf="filterOptions.brands.length > 0">
      <h4 class="filter-title">Brand</h4>
      <div class="filter-options">
        <label *ngFor="let brand of filterOptions.brands" class="filter-checkbox">
          <input 
            type="checkbox" 
            [checked]="isBrandSelected(brand)"
            (change)="onBrandChange(brand, $any($event.target).checked)"
          />
          <span>{{ brand }}</span>
        </label>
      </div>
    </div>

    <!-- Tags Filter -->
    <div class="filter-section font-iosevka" *ngIf="filterOptions.tags.length > 0">
      <h4 class="filter-title">Categories</h4>
      <div class="filter-options">
        <label *ngFor="let tag of filterOptions.tags" class="filter-checkbox">
          <input 
            type="checkbox" 
            [checked]="isTagSelected(tag)"
            (change)="onTagChange(tag, $any($event.target).checked)"
          />
          <span>{{ tag }}</span>
        </label>
      </div>
    </div>
  </div>

  <div class="mobile-filter-footer font-iosevka">
    <button (click)="onClearFilters()" class="clear-btn">Clear All</button>
    <button (click)="onClose()" class="apply-btn">Apply Filters</button>
  </div>
</div>
