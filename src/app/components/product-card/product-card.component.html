<div
  *ngIf="showToast"
  class="fixed top-6 left-1/2 -translate-x-1/2 bg-orange-500 text-white px-4 py-3 rounded-lg shadow-lg z-50 animate-fade-in"
>
  {{ toastMessage }}
</div>

<div class="card">
  <!-- Wishlist button OUTSIDE card-inner, positioned absolutely relative to .card -->
  <button 
    class="wishlist-btn"
    (click)="onToggleWishlist($event)"
    [class.in-wishlist]="isInWishlist"
    [title]="isInWishlist ? 'Remove from wishlist' : 'Add to wishlist'"
  >
    <svg 
      *ngIf="isInWishlist" 
      class="heart-icon"
      fill="currentColor" 
      viewBox="0 0 20 20"
    >
      <path 
        fill-rule="evenodd" 
        d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" 
        clip-rule="evenodd"
      />
    </svg>
    
    <svg 
      *ngIf="!isInWishlist" 
      class="heart-icon"
      fill="none" 
      stroke="currentColor" 
      viewBox="0 0 24 24"
    >
      <path 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        stroke-width="2" 
        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
      />
    </svg>
  </button>

  <div class="card-inner">
    <!-- Front -->
    <div class="card-front">
      <!-- Image Loading State -->
      <div class="image-container">
        <div class="image-placeholder" *ngIf="!imageLoaded">
          <div class="spinner"></div>
        </div>
        <img
          [src]="productImage"
          [alt]="product.title"
          (load)="onImageLoad()"
          (error)="onImageError()"
          [class.loaded]="imageLoaded"
        />
      </div>
      <div class="product-info">
        <h3 class="product-title font-advent">{{ product.title }}</h3>
        <p class="product-price">{{ formattedPrice }}</p>
      </div>
    </div>

    <!-- Back -->
    <div class="card-back">
      <div class="back-content">
        <h3 class="back-title font-advent">{{ product.title }}</h3>
        <p class="back-price">{{ formattedPrice }}</p>
        <div class="button-group">
          <button class="btn-primary" (click)="onAddToCart()">
            <i class="fa fa-shopping-cart"></i> Add to Cart
          </button>
          <button class="btn-secondary" (click)="onViewDetails()">
            View Details
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
