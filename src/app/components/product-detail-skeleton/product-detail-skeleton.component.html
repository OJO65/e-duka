<div class="skeleton-container">
      <!-- Breadcrumb Skeleton -->
      <div class="breadcrumb-skeleton"></div>

      <div class="skeleton-grid">
        <!-- Image Gallery Skeleton -->
        <div class="image-gallery-skeleton">
          <!-- Main Image -->
          <div class="main-image-skeleton"></div>

          <!-- Thumbnails -->
          <div class="thumbnail-list-skeleton">
            <div class="thumbnail-skeleton" *ngFor="let i of [1,2,3,4]"></div>
          </div>
        </div>

        <!-- Product Info Skeleton -->
        <div class="product-info-skeleton">
          <!-- Vendor -->
          <div class="skeleton-vendor"></div>

          <!-- Title -->
          <div class="skeleton-title"></div>
          <div class="skeleton-title short"></div>

          <!-- Price -->
          <div class="skeleton-price"></div>

          <!-- Availability -->
          <div class="skeleton-availability"></div>

          <!-- Description Section -->
          <div class="skeleton-description-section">
            <div class="skeleton-description-title"></div>
            <div class="skeleton-description-line"></div>
            <div class="skeleton-description-line"></div>
            <div class="skeleton-description-line short"></div>
          </div>

          <!-- Variants Section -->
          <div class="skeleton-variants">
            <div class="skeleton-variant-title"></div>
            <div class="skeleton-variant-options">
              <div class="skeleton-variant-btn" *ngFor="let i of [1,2,3]"></div>
            </div>
          </div>

          <!-- Quantity Section -->
          <div class="skeleton-quantity">
            <div class="skeleton-quantity-label"></div>
            <div class="skeleton-quantity-control"></div>
          </div>

          <!-- Action Buttons -->
          <div class="skeleton-buttons">
            <div class="skeleton-button"></div>
            <div class="skeleton-button"></div>
          </div>

          <!-- Meta Section -->
          <div class="skeleton-meta">
            <div class="skeleton-meta-line"></div>
            <div class="skeleton-meta-line"></div>
          </div>
        </div>
      </div>
    </div>
