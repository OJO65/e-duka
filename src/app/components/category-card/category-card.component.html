<div class="card">
  <div class="card-inner">
    <!-- Front -->
    <div class="card-front">
      <div class="image-wrapper">
        <img
          [src]="category.image?.url || 'assets/placeholder.jpg'"
          [alt]="category.title"
          (load)="onImageLoad()"
          (error)="onImageError()"
        />
      </div>
      <h2 class="category-label font-advent">{{ category.title }}</h2>
    </div>

    <!-- Back -->
    <div class="card-back">
      <button (click)="toShop()">Shop Now</button>
    </div>
  </div>
</div>
