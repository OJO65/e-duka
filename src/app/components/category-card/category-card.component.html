<div class="card">
  <div class="card-inner">
    <!-- Front -->
    <div class="card-front">
      <img [src]="category.image?.url" alt="" />
      <h2 class="font-advent text-2xl font-semibold">{{ category.title }}</h2>
    </div>

    <!-- Back -->
    <div class="card-back">
      <button>Shop Now</button>
    </div>
  </div>
</div>
