<div class="card font-iosevka" (click)="toShop()">
  <div class="image-wrapper">
    <div class="image-placeholder" *ngIf="!imageLoaded">
      <div class="shimmer"></div>
    </div>
    <img
      [src]="category.image?.url || 'assets/placeholder.jpg'"
      [alt]="category.title"
      (load)="onImageLoad()"
      (error)="onImageError()"
      [class.loaded]="imageLoaded"
      loading="eager"
      fetchpriority="high"
    />
  </div>
  <h2 class="category-label font-iosevka">{{ category.title }}</h2>
</div>
