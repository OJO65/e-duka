<!-- TOP BLACK FRIDAY BAR -->
<div
  class="w-full bg-[#f2f2f2] px-4 md:px-6 py-2 flex justify-between text-xs md:text-sm"
>
  <div class="flex gap-2 md:gap-4 font-advent font-semibold">
    <a href="#" class="hover:underline">Sell on E-DUKA</a>
  </div>

  <div class="flex gap-2 md:gap-4 font-advent font-semibold">
    <span class="cursor-pointer hidden sm:inline">E-DUKAPay</span>
    <span class="cursor-pointer">Delivery</span>
  </div>
</div>

<!-- MAIN HEADER -->
<header class="w-full bg-white border-b px-4 md:px-6 py-4 sticky top-0 z-50">
  <!-- Mobile Header -->
  <div class="flex items-center justify-between lg:hidden">
    <!-- Burger Menu -->
    <button (click)="toggleMobileMenu()" class="text-2xl mr-3">
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        ></path>
      </svg>
    </button>

    <!-- Logo -->
    <div (click)="goHome()" class="cursor-pointer text-2xl font-bold tracking-wide flex-1 font-advent">
      E-DUKA<span class="text-orange-500">*</span>
    </div>

    <!-- Mobile Icons -->
    <div class="flex items-center gap-3">
      <button class="cursor-pointer">
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          ></path>
        </svg>
      </button>
      <button class="cursor-pointer relative">
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
          ></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Search (below header) -->
  <div class="mt-3 lg:hidden">
    <div class="relative">
      <input
        type="text"
        placeholder="Search products..."
        [(ngModel)]="searchQuery"
        (input)="onSearchInput()"
        class="w-full border-2 border-gray-200 px-4 py-2.5 pr-24 rounded-lg outline-none text-sm transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100"
      />
      
      <!-- Search Icon -->
      <svg
        class="w-5 h-5 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none transition-colors"
        [class.text-orange-500]="searchQuery"
        [class.text-gray-400]="!searchQuery"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
      
      <!-- Clear Button (shows when typing) -->
      <button
        *ngIf="searchQuery"
        (click)="clearSearch()"
        class="absolute right-12 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-all hover:scale-110 p-1"
        title="Clear search"
      >
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd"
          />
        </svg>
      </button>
    </div>
  </div>

  <!-- Desktop Header -->
  <div class="hidden lg:flex items-center justify-around">
    <!-- Logo -->
    <div (click)="goHome()" class="relative inline-block cursor-pointer">
      <!-- IMAGE -->
      <img src="undraw_shopping-app_b80f.svg" alt="shopping" class="h-28" />

      <!-- OVERLAYED TEXT -->
      <div
        class="absolute left-22 font-advent bottom-11 -translate-x-2 font-bold w-full text-3xl font-serif"
      >
        E-DUKA<span class="text-orange-500">*</span>
      </div>
    </div>

    <!-- Search bar -->
    <div class="flex flex-1 mx-10 max-w-[620px] relative group">
      <input
        type="text"
        placeholder="Search products, brands and categories..."
        [(ngModel)]="searchQuery"
        (input)="onSearchInput()"
        class="flex-1 border-2 border-gray-200 px-5 py-3 pr-28 rounded-lg outline-none transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100 focus:shadow-md"
      />
      
      <!-- Search Icon -->
      <div class="absolute right-5 top-1/2 -translate-y-1/2 flex items-center gap-3">
        <!-- Clear Button -->
        <button
          *ngIf="searchQuery"
          (click)="clearSearch()"
          class="text-gray-400 hover:text-gray-600 transition-all hover:scale-110"
          title="Clear search"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
              clip-rule="evenodd"
            />
          </svg>
        </button>
        
        <!-- Search Icon (default state) -->
        <svg
          *ngIf="!searchQuery"
          class="w-5 h-5 text-gray-400 pointer-events-none transition-colors group-focus-within:text-orange-500"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
      </div>
    </div>

    <!-- Icons with text -->
    <div class="flex items-center gap-6 text-sm">
      <div class="relative">
        <a
          (click)="toggleAccountMenu()"
          class="cursor-pointer hover:text-orange-500"
          >Account<i class="fa-solid fa-caret-down ml-2"></i
        ></a>
        <div
          *ngIf="isAccountMenuOpen"
          class="absolute top-full left-0 mt-2 bg-white border shadow-lg rounded-md min-w-[150px] z-10"
        >
          <button
            class="bg-orange-500 hover:cursor-pointer hover:bg-gray-100 text-bold text-white hover:text-orange-500 font-semibold py-2 px-4 border border-gray-400 rounded shadow mx-auto flex mt-2"
          >
            Sign In
          </button>
          <a href="#" class="block px-4 py-2 hover:bg-gray-100">My Account</a>
          <a href="#" class="block px-4 py-2 hover:bg-gray-100">Orders</a>
          <a href="#" class="block px-4 py-2 hover:bg-gray-100">Wishlist</a>
        </div>
      </div>
      <a class="cursor-pointer hover:text-orange-500"
        >Help<i class="fa fa-question ml-2" aria-hidden="true"></i
      ></a>
      <a class="cursor-pointer hover:text-orange-500"
        >Cart<i class="fa fa-shopping-cart ml-2" aria-hidden="true"></i
      ></a>
    </div>
  </div>
</header>

<!-- Mobile Menu Sidebar -->
<div
  class="fixed top-0 left-0 w-64 h-full bg-white shadow-xl z-50 lg:hidden transform transition-transform duration-300 ease-in-out"
  [class.translate-x-0]="isMobileMenuOpen"
  [class.-translate-x-full]="!isMobileMenuOpen"
>
  <div class="p-6">
    <button
      (click)="closeMobileMenu()"
      class="text-2xl mb-6 hover:text-orange-500"
    >
      &times;
    </button>
    <nav class="flex flex-col gap-4 font-advent font-semibold">
      <a href="#" class="text-lg hover:text-orange-500 py-2 border-b"
        >Account</a
      >
      <a href="#" class="text-lg hover:text-orange-500 py-2 border-b">Help</a>
      <a href="#" class="text-lg hover:text-orange-500 py-2 border-b"
        >Sell on E-DUKA</a
      >
      <a href="#" class="text-lg hover:text-orange-500 py-2 border-b"
        >E-DUKAPay</a
      >
      <a href="#" class="text-lg hover:text-orange-500 py-2">Delivery</a>
    </nav>
  </div>
</div>
