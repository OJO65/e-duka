<div class="min-h-screen bg-gray-50 flex flex-col">


  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- Card -->
      <div class="bg-white rounded-lg shadow-lg p-8">
        <!-- Title -->
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
          <p class="text-gray-600">Sign in to your GNET COMPUTERS account</p>
        </div>

        <!-- Error Message -->
        <div 
          *ngIf="errorMessage" 
          class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-start"
        >
          <svg class="w-5 h-5 mr-2 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- Login Form -->
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <!-- Email Field -->
          <div class="mb-5">
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
              Email Address
            </label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              required
              email
              class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100"
              placeholder="you@example.com"
              [disabled]="isLoading"
            />
          </div>

          <!-- Password Field -->
          <div class="mb-5">
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
              Password
            </label>
            <div class="relative">
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                name="password"
                [(ngModel)]="password"
                required
                minlength="6"
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100 pr-12"
                placeholder="Enter your password"
                [disabled]="isLoading"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                [disabled]="isLoading"
              >
                <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="flex items-center justify-between mb-6">
            <label class="flex items-center cursor-pointer">
              <input
                type="checkbox"
                [(ngModel)]="rememberMe"
                name="rememberMe"
                class="w-4 h-4 text-orange-500 border-gray-300 rounded focus:ring-orange-500 cursor-pointer"
                [disabled]="isLoading"
              />
              <span class="ml-2 text-sm text-gray-700">Remember me</span>
            </label>
            <a href="/forgot-password" class="text-sm text-orange-500 hover:text-orange-600 font-semibold">
              Forgot Password?
            </a>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            [disabled]="isLoading || !loginForm.valid"
            class="w-full bg-orange-500 text-white font-semibold py-3 rounded-lg hover:bg-orange-600 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center"
          >
            <span *ngIf="!isLoading">Sign In</span>
            <span *ngIf="isLoading" class="flex items-center">
              <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Signing in...
            </span>
          </button>
        </form>

        <!-- Demo Credentials Helper -->
        <div class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
          <p class="text-xs text-blue-800 mb-2">
            <strong>Demo Account:</strong>
          </p>
          <button
            type="button"
            (click)="fillDemoCredentials()"
            class="text-xs text-blue-600 hover:text-blue-800 underline"
          >
            Click to fill demo credentials
          </button>
        </div>

        <!-- Divider -->
        <div class="mt-8 relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-600">Don't have an account?</span>
          </div>
        </div>

        <!-- Register Link -->
        <button
          type="button"
          (click)="goToRegister()"
          class="mt-6 w-full border-2 border-orange-500 text-orange-500 font-semibold py-3 rounded-lg hover:bg-orange-50 transition-colors"
        >
          Create New Account
        </button>
      </div>

      <!-- Footer Text -->
      <p class="text-center text-sm text-gray-600 mt-6">
        By signing in, you agree to E-DUKA's 
        <a href="#" class="text-orange-500 hover:underline">Terms of Service</a> and 
        <a href="#" class="text-orange-500 hover:underline">Privacy Policy</a>
      </p>
    </div>
  </div>
</div>
