<div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-6">
  <!-- Show PRODUCT SKELETON when loading products -->
  <ng-container *ngIf="loading && showProducts">
    <app-skeleton-card
      *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"
    ></app-skeleton-card>
  </ng-container>

  <!-- Show CATEGORY SKELETON when loading categories -->
  <ng-container *ngIf="loading && !showProducts">
    <app-category-skeleton
      *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"
    ></app-category-skeleton>
  </ng-container>

  <!-- Show PRODUCTS when searching (and not loading) -->
  <ng-container *ngIf="showProducts && !loading">
    <div
      *ngFor="let product of products"
      #revealCard
      class="opacity-0 translate-y-6 transition-all duration-700 ease-out"
    >
      <app-product-card [product]="product"></app-product-card>
    </div>
  </ng-container>

  <!-- Show CATEGORIES when not searching (and not loading) -->
  <ng-container *ngIf="!showProducts && !loading">
    <div
      *ngFor="let category of categories"
      #revealCategory
      class="opacity-0 translate-y-6 transition-all duration-700 ease-out"
    >
      <app-category-card [category]="category"></app-category-card>
    </div>
  </ng-container>
</div>

<!-- Empty state when no results -->
<div
  *ngIf="showProducts && !loading && products.length === 0"
  class="text-center py-20"
>
  <p class="text-xl text-gray-500 font-advent">No products found</p>
  <p class="text-gray-400 mt-2">Try searching for something else</p>
</div>
