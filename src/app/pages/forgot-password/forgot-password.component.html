<div class="min-h-screen bg-gray-50 flex flex-col">
  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- Card -->
      <div class="bg-white rounded-lg shadow-lg p-8">
        <!-- STEP 1: Email Verification -->
        <div *ngIf="currentStep === 'email'">
          <!-- Title -->
          <div class="text-center mb-8">
            <div
              class="mx-auto w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4"
            >
              <svg
                class="w-8 h-8 text-[#1a56db]"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
                />
              </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">
              Forgot Password?
            </h1>
            <p class="text-gray-600">
              No worries! Enter your email and we'll help you reset it.
            </p>
          </div>

          <!-- Error Message -->
          <div
            *ngIf="errorMessage"
            class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-start"
          >
            <svg
              class="w-5 h-5 mr-2 shrink-0 mt-0.5"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                clip-rule="evenodd"
              />
            </svg>
            <span>{{ errorMessage }}</span>
          </div>

          <!-- Email Form -->
          <form (ngSubmit)="onSubmitEmail()" #emailForm="ngForm">
            <!-- Email Field -->
            <div class="mb-6">
              <label
                for="email"
                class="block text-sm font-semibold text-gray-700 mb-2"
              >
                Email Address
              </label>
              <input
                type="email"
                id="email"
                name="email"
                [(ngModel)]="email"
                required
                email
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-[#1a56db] focus:ring-2 focus:ring-blue-100"
                placeholder="you@example.com"
                [disabled]="isLoading"
              />
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              [disabled]="isLoading || !emailForm.valid"
              class="w-full bg-[#e02424] text-white font-semibold py-3 rounded-lg hover:bg-[#b91c1c] transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center mb-4"
            >
              <span *ngIf="!isLoading">Continue</span>
              <span *ngIf="isLoading" class="flex items-center">
                <svg
                  class="animate-spin h-5 w-5 mr-2"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                  ></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                  ></path>
                </svg>
                Verifying...
              </span>
            </button>

            <!-- Back to Login -->
            <button
              type="button"
              (click)="goToLogin()"
              class="w-full text-[#1a56db] hover:text-[#1a56db] font-semibold text-sm"
            >
              ← Back to Login
            </button>
          </form>
        </div>

        <!-- STEP 2: Password Reset -->
        <div *ngIf="currentStep === 'reset'">
          <!-- Title -->
          <div class="text-center mb-8">
            <div
              class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4"
            >
              <svg
                class="w-8 h-8 text-green-500"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">
              Reset Password
            </h1>
            <p class="text-gray-600">
              Create a new password for <strong>{{ email }}</strong>
            </p>
          </div>

          <!-- Success Message -->
          <div
            *ngIf="successMessage"
            class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-start"
          >
            <svg
              class="w-5 h-5 mr-2 shrink-0 mt-0.5"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                clip-rule="evenodd"
              />
            </svg>
            <span>{{ successMessage }}</span>
          </div>

          <!-- Error Message -->
          <div
            *ngIf="errorMessage"
            class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-start"
          >
            <svg
              class="w-5 h-5 mr-2 shrink-0 mt-0.5"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                clip-rule="evenodd"
              />
            </svg>
            <span>{{ errorMessage }}</span>
          </div>

          <!-- Password Reset Form -->
          <form (ngSubmit)="onSubmitNewPassword()" #resetForm="ngForm">
            <!-- New Password Field -->
            <div class="mb-5">
              <label
                for="newPassword"
                class="block text-sm font-semibold text-gray-700 mb-2"
              >
                New Password
              </label>
              <div class="relative">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  id="newPassword"
                  name="newPassword"
                  [(ngModel)]="newPassword"
                  required
                  minlength="6"
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-[#1a56db] focus:ring-2 focus:ring-blue-100 pr-12"
                  placeholder="At least 6 characters"
                  [disabled]="isLoading"
                />
                <button
                  type="button"
                  (click)="togglePasswordVisibility()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                  [disabled]="isLoading"
                >
                  <svg
                    *ngIf="!showPassword"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                  <svg
                    *ngIf="showPassword"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Confirm Password Field -->
            <div class="mb-6">
              <label
                for="confirmPassword"
                class="block text-sm font-semibold text-gray-700 mb-2"
              >
                Confirm New Password
              </label>
              <div class="relative">
                <input
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  id="confirmPassword"
                  name="confirmPassword"
                  [(ngModel)]="confirmPassword"
                  required
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-[#1a56db] focus:ring-2 focus:ring-blue-100 pr-12"
                  placeholder="Re-enter your password"
                  [disabled]="isLoading"
                />
                <button
                  type="button"
                  (click)="toggleConfirmPasswordVisibility()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                  [disabled]="isLoading"
                >
                  <svg
                    *ngIf="!showConfirmPassword"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                  <svg
                    *ngIf="showConfirmPassword"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              [disabled]="isLoading || !resetForm.valid"
              class="w-full bg-[#e02424] text-white font-semibold py-3 rounded-lg hover:bg-[#b91c1c] transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center mb-4"
            >
              <span *ngIf="!isLoading">Reset Password</span>
              <span *ngIf="isLoading" class="flex items-center">
                <svg
                  class="animate-spin h-5 w-5 mr-2"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                  ></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                  ></path>
                </svg>
                Resetting...
              </span>
            </button>

            <!-- Back Button -->
            <button
              type="button"
              (click)="backToEmail()"
              class="w-full text-[#1a56db] hover:text-[#1a56db] font-semibold text-sm"
              [disabled]="isLoading"
            >
              ← Use a different email
            </button>
          </form>
        </div>
      </div>

      <!-- Footer Text -->
      <p class="text-center text-sm text-gray-600 mt-6">
        Remember your password?
        <a
          (click)="goToLogin()"
          class="text-[#1a56db] hover:underline cursor-pointer font-semibold"
          >Sign In</a
        >
      </p>
    </div>
  </div>
</div>
