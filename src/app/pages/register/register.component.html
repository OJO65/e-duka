<div class="min-h-screen bg-gray-50 flex flex-col font-iosevka">
  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <!-- Card -->
      <div class="bg-white rounded-lg shadow-lg p-8">
        <!-- Title -->
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-gray-900 mb-2">Create Account</h1>
          <p class="text-gray-600">Join GNET COMPUTERS today</p>
        </div>

        <!-- Success Message -->
        <div
          *ngIf="successMessage"
          class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-start"
        >
          <svg
            class="w-5 h-5 mr-2 shrink-0 mt-0.5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
              clip-rule="evenodd"
            />
          </svg>
          <span>{{ successMessage }}</span>
        </div>

        <!-- Error Message -->
        <div
          *ngIf="errorMessage"
          class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-start"
        >
          <svg
            class="w-5 h-5 mr-2 shrink-0 mt-0.5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
              clip-rule="evenodd"
            />
          </svg>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- Registration Form -->
        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
          <!-- Username Field -->
          <div class="mb-5">
            <label
              for="username"
              class="block text-sm font-semibold text-gray-700 mb-2"
            >
              Username
            </label>
            <input
              type="text"
              id="username"
              name="username"
              [(ngModel)]="username"
              required
              minlength="3"
              class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100"
              placeholder="Choose a username"
              [disabled]="isLoading"
            />
          </div>

          <!-- Email Field -->
          <div class="mb-5">
            <label
              for="email"
              class="block text-sm font-semibold text-gray-700 mb-2"
            >
              Email Address
            </label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              required
              email
              class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100"
              placeholder="you@example.com"
              [disabled]="isLoading"
            />
          </div>

          <!-- Password Field -->
          <div class="mb-5">
            <label
              for="password"
              class="block text-sm font-semibold text-gray-700 mb-2"
            >
              Password
            </label>
            <div class="relative">
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                name="password"
                [(ngModel)]="password"
                (input)="onPasswordInput()"
                required
                minlength="6"
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100 pr-12"
                placeholder="At least 6 characters"
                [disabled]="isLoading"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                [disabled]="isLoading"
              >
                <svg
                  *ngIf="!showPassword"
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
                <svg
                  *ngIf="showPassword"
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                  />
                </svg>
              </button>
            </div>

            <!-- Password Strength Indicator -->
            <div *ngIf="password" class="mt-2">
              <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                <div
                  class="h-full transition-all duration-300"
                  [ngClass]="
                    getPasswordStrengthColor() +
                    ' ' +
                    getPasswordStrengthWidth()
                  "
                ></div>
              </div>
              <p
                class="text-xs mt-1 capitalize"
                [ngClass]="{
                  'text-red-600': passwordStrength === 'weak',
                  'text-yellow-600': passwordStrength === 'medium',
                  'text-green-600': passwordStrength === 'strong',
                }"
              >
                {{ passwordStrength ? passwordStrength + " password" : "" }}
              </p>
            </div>
          </div>

          <!-- Confirm Password Field -->
          <div class="mb-5">
            <label
              for="confirmPassword"
              class="block text-sm font-semibold text-gray-700 mb-2"
            >
              Confirm Password
            </label>
            <div class="relative">
              <input
                [type]="showConfirmPassword ? 'text' : 'password'"
                id="confirmPassword"
                name="confirmPassword"
                [(ngModel)]="confirmPassword"
                required
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg outline-none transition-all focus:border-orange-500 focus:ring-2 focus:ring-orange-100 pr-12"
                placeholder="Re-enter your password"
                [disabled]="isLoading"
              />
              <button
                type="button"
                (click)="toggleConfirmPasswordVisibility()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                [disabled]="isLoading"
              >
                <svg
                  *ngIf="!showConfirmPassword"
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
                <svg
                  *ngIf="showConfirmPassword"
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- Terms and Conditions -->
          <div class="mb-6">
            <label class="flex items-start cursor-pointer">
              <input
                type="checkbox"
                [(ngModel)]="agreeToTerms"
                name="agreeToTerms"
                class="w-4 h-4 mt-1 text-orange-500 border-gray-300 rounded focus:ring-orange-500 cursor-pointer"
                [disabled]="isLoading"
              />
              <span class="ml-2 text-sm text-gray-700">
                I agree to the
                <a routerLink="/terms" class="text-orange-500 hover:underline"
                  >Terms and Conditions</a
                >
                and
                <a
                  routerLink="/privacy-policy"
                  class="text-orange-500 hover:underline"
                  >Privacy Policy</a
                >
              </span>
            </label>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            [disabled]="isLoading || !registerForm.valid || !agreeToTerms"
            class="w-full bg-orange-500 text-white font-semibold py-3 rounded-lg hover:bg-orange-600 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center"
          >
            <span *ngIf="!isLoading">Create Account</span>
            <span *ngIf="isLoading" class="flex items-center">
              <svg
                class="animate-spin h-5 w-5 mr-2"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
              </svg>
              Creating account...
            </span>
          </button>
          <!-- Google Sign In -->
          <div class="divider-or">
            <span>or</span>
          </div>

          <button type="button" class="btn-google" (click)="signInWithGoogle()">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Continue with Google
          </button>
        </form>

        <!-- Divider -->
        <div class="mt-8 relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-600"
              >Already have an account?</span
            >
          </div>
        </div>

        <!-- Login Link -->
        <button
          type="button"
          (click)="goToLogin()"
          class="mt-6 w-full border-2 border-orange-500 text-orange-500 font-semibold py-3 rounded-lg hover:bg-orange-50 transition-colors"
        >
          Sign In Instead
        </button>
      </div>
    </div>
  </div>
</div>
